services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: three_minutes
      POSTGRES_USER: three_minutes
      POSTGRES_PASSWORD: change_me
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U three_minutes -d three_minutes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
